<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMS — Learning Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ==================== DASHBOARD VIEW ==================== -->
  <div id="dashboard-view">
    <div class="courses-container card">
      <div class="courses-header">
        <h2>All Courses</h2>
        <div class="courses-filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="live">Live</button>
          <button class="filter-btn" data-filter="upcoming">Upcoming</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <div class="courses-actions">
          <select id="category-select" class="category-dropdown">
            <option value="all">All Categories</option>
          </select>
          <div class="view-toggle">
            <button class="toggle-btn active" data-view="grid"><i class="fas fa-th"></i></button>
            <button class="toggle-btn" data-view="list"><i class="fas fa-list"></i></button>
          </div>
        </div>
      </div>
      <div id="courses-grid" class="courses-grid"></div>
    </div>
  </div>

  <!-- ==================== COURSE VIEW ==================== -->
  <div id="course-view" style="display:none">
    <button id="back-to-dashboard" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Courses</button>
    <div class="course-view-container">

      <!-- LEFT: Sidebar -->
      <div id="sidebar-panel" class="panel sidebar-panel card"></div>

      <!-- CENTER: Lesson Content -->
      <div class="panel lesson-panel card">
        <div class="lesson-header-bar">
          <span class="lesson-content-title">Lesson Content</span>
          <div class="slide-counter" id="slide-counter">1 / 5</div>
        </div>
        <h2 id="lesson-main-title" class="lesson-main-title"></h2>

        <!-- Slide Viewer -->
        <div id="slide-viewer" class="slide-viewer">
          <div id="slide-content" class="slide-content"></div>
          <div class="slide-controls">
            <button id="slide-prev" class="slide-nav-btn"><i class="fas fa-chevron-left"></i> Previous</button>
            <div class="slide-dots" id="slide-dots"></div>
            <button id="slide-next" class="slide-nav-btn">Next <i class="fas fa-chevron-right"></i></button>
          </div>
        </div>

        <!-- Tabs -->
        <div class="lesson-tabs">
          <button class="tab active" data-tab="overview">Overview</button>
          <button class="tab" data-tab="notes">Notes</button>
          <button class="tab" data-tab="resources">Resources</button>
        </div>
        <div id="tab-content" class="tab-content"></div>
      </div>

      <!-- RIGHT: AI Playground -->
      <div class="panel playground-panel card">
        <div class="playground-header">
          <h3 class="playground-title"><i class="fas fa-robot"></i> AI Playground (Practice)</h3>
        </div>
        <div class="playground-content">
          <h4 class="playground-label">Your Task</h4>
          <p id="exercise-task" class="playground-task"></p>
          <div id="exercise-hint" class="exercise-hint" style="display:none">
            <i class="fas fa-lightbulb"></i> <span id="hint-text"></span>
          </div>
          <button id="show-hint-btn" class="btn-hint">💡 Show Hint</button>
          <h4 class="playground-label">Your Prompt</h4>
          <textarea id="prompt-input" class="playground-input" placeholder="Type your prompt here..."></textarea>
          <button id="run-ai-btn" class="btn-run"><i class="fas fa-play"></i> Run with AI</button>
          <h4 class="playground-label">AI Output</h4>
          <div id="ai-output" class="playground-output">
            <span class="placeholder-text">Your AI response will appear here...</span>
          </div>
          <div class="playground-actions">
            <button id="save-btn" class="btn-save"><i class="fas fa-bookmark"></i> Save</button>
            <button id="submit-btn" class="btn-submit"><i class="fas fa-check"></i> Submit Task</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
